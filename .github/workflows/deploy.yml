name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -- --skip-optimize || npx astro build
        env:
          # Selects/ folder is gitignored. Optimized media is committed to public/media/.
          # If you ever check in Selects/, the optimize step will run; otherwise we build directly.
          SKIP_OPTIMIZE: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
